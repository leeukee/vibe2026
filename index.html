<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국사능력검정시험 심화 연습</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 780px; margin: 0 auto; }
    header { text-align: center; padding: 36px 0 24px; }
    header h1 { font-size: 1.75rem; font-weight: 700; color: #ffd700; margin-bottom: 6px; }
    header p { color: #aac8e4; font-size: 0.9rem; }

    /* 시작 */
    #startScreen { text-align: center; padding: 50px 20px; }
    .badge {
      display: inline-block;
      background: rgba(255,215,0,0.15);
      border: 1px solid #ffd700;
      color: #ffd700;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      margin-bottom: 24px;
    }
    #startScreen h2 { font-size: 1.3rem; margin-bottom: 12px; color: #e0f0ff; }
    #startScreen p { color: #aac8e4; line-height: 1.8; margin-bottom: 36px; font-size: 0.93rem; }
    .pool-info {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .pool-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.82rem;
      color: #c8e0f4;
    }
    .pool-chip span { display: block; font-size: 1.1rem; font-weight: 700; color: #ffd700; margin-bottom: 2px; }
    .btn-start {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a1a;
      border: none;
      padding: 15px 46px;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,215,0,0.5); }

    /* 진행 */
    #quizScreen { display: none; }
    .progress-wrap { margin-bottom: 22px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.83rem; color: #aac8e4; margin-bottom: 7px; }
    .progress-bar { background: rgba(255,255,255,0.15); border-radius: 10px; height: 7px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #ffd700, #ffaa00); height: 100%; border-radius: 10px; transition: width 0.4s ease; }

    /* 문제 카드 */
    .question-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 26px;
      margin-bottom: 18px;
    }
    .question-meta { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .q-num { font-size: 0.78rem; color: #ffd700; font-weight: 700; letter-spacing: 0.5px; }
    .q-round {
      font-size: 0.72rem;
      background: rgba(255,215,0,0.15);
      border: 1px solid rgba(255,215,0,0.3);
      color: #ffd700;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .question-text { font-size: 1.02rem; line-height: 1.75; color: #e8f4ff; margin-bottom: 22px; }
    .options { display: flex; flex-direction: column; gap: 9px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 13px 15px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .option:hover { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.4); }
    .option.selected { background: rgba(255,215,0,0.18); border-color: #ffd700; }
    .option-num { font-size: 0.82rem; font-weight: 700; color: #ffd700; min-width: 18px; margin-top: 1px; }
    .option-text { font-size: 0.93rem; line-height: 1.5; color: #ddeeff; }

    /* 네비 */
    .nav-wrap { display: flex; justify-content: space-between; align-items: center; }
    .btn-nav {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 11px 26px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.93rem;
      transition: all 0.18s;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.18); }
    .btn-nav.primary {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border: none;
      color: #1a1a1a;
      font-weight: 700;
    }
    .btn-nav.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(255,215,0,0.4); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* 결과 */
    #resultScreen { display: none; }
    .score-card {
      text-align: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 38px 28px;
      margin-bottom: 28px;
    }
    .score-circle {
      width: 110px; height: 110px; border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 0 28px rgba(255,215,0,0.4);
    }
    .score-num { font-size: 2rem; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .score-label { font-size: 0.72rem; color: #1a1a1a; font-weight: 600; }
    .score-card h2 { font-size: 1.2rem; color: #ffd700; margin-bottom: 6px; }
    .score-card p { color: #aac8e4; font-size: 0.88rem; }
    .remain-info { color: #7ec8e3; font-size: 0.82rem; margin-top: 10px; }

    /* 해설 */
    .review-title {
      font-size: 1.05rem; font-weight: 700; color: #ffd700;
      margin-bottom: 14px; padding-bottom: 9px;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .review-item {
      background: rgba(255,255,255,0.06);
      border-radius: 12px; padding: 18px;
      margin-bottom: 12px;
      border-left: 3px solid #2ed573;
    }
    .review-item.wrong { border-left-color: #ff4757; }
    .review-q { font-size: 0.77rem; color: #aac8e4; margin-bottom: 3px; font-weight: 600; }
    .review-question { font-size: 0.93rem; color: #e8f4ff; margin-bottom: 9px; line-height: 1.6; }
    .review-answers { font-size: 0.85rem; margin-bottom: 10px; }
    .answer-correct { color: #2ed573; font-weight: 600; }
    .answer-wrong { color: #ff4757; }
    .review-explanation {
      background: rgba(255,255,255,0.06);
      border-radius: 8px; padding: 11px 13px;
      font-size: 0.86rem; color: #c8e0f4; line-height: 1.7;
    }
    .review-explanation strong { color: #ffd700; display: block; margin-bottom: 3px; }
    .btn-next-round {
      display: block; width: 100%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a1a; border: none;
      padding: 15px; font-size: 0.98rem; font-weight: 700;
      border-radius: 12px; cursor: pointer; margin-top: 22px;
      transition: all 0.2s;
    }
    .btn-next-round:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,0.4); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>한국사능력검정시험</h1>
    <p>심화 (1·2급) 기출 문제 연습</p>
  </header>

  <div id="startScreen">
    <div class="badge">60회~67회 기출 기반</div>
    <h2>실력을 확인해보세요</h2>
    <p>
      각 회차 기출 문제에서 랜덤으로 <strong style="color:#ffd700">10문제</strong>가 출제됩니다.<br>
      한 번 나온 문제는 전체를 다 풀기 전까지 다시 나오지 않습니다.<br>
      모든 문제를 풀면 바로 다음 10문제가 이어집니다.
    </p>
    <div class="pool-info">
      <div class="pool-chip"><span id="totalCount">0</span>전체 문제</div>
      <div class="pool-chip"><span id="remainCount">0</span>남은 문제</div>
      <div class="pool-chip"><span>8회차</span>수록 회차</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">문제 풀기 시작</button>
  </div>

  <div id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressText">1 / 10</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="question-card">
      <div class="question-meta">
        <div class="q-num" id="questionNum">문제 1</div>
        <div class="q-round" id="questionRound"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>
    <div class="nav-wrap">
      <button class="btn-nav" id="btnPrev" onclick="prevQuestion()">이전</button>
      <button class="btn-nav primary" id="btnNext" onclick="nextQuestion()">다음</button>
    </div>
  </div>

  <div id="resultScreen">
    <div class="score-card">
      <div class="score-circle">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">/ 10</div>
      </div>
      <h2 id="scoreTitle"></h2>
      <p id="scoreDesc"></p>
      <p class="remain-info" id="remainInfo"></p>
    </div>
    <div class="review-title">문제별 해설</div>
    <div id="reviewWrap"></div>
    <button class="btn-next-round" id="btnNextRound" onclick="startQuiz()">다음 10문제 풀기</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ── 60회 ──────────────────────────────────────────────
  {
    round: "제60회",
    q: "다음 유물을 사용한 시대의 생활 모습으로 옳은 것은? (빗살무늬 토기)",
    options: ["주먹도끼를 이용해 사냥을 하였다.", "계급이 없는 평등한 공동체 생활을 하였다.", "반달 돌칼로 이삭을 잘라 수확하였다.", "비파형 동검을 제작하여 사용하였다.", "철제 농기구로 깊이갈이를 하였다."],
    answer: 1,
    exp: "빗살무늬 토기는 신석기 시대의 대표적 유물입니다. 신석기 시대에는 농경과 목축이 시작되었고, 씨족 중심의 평등한 공동체 사회였습니다. 반달 돌칼은 청동기, 비파형 동검은 청동기, 철제 농기구는 철기 시대 유물입니다."
  },
  {
    round: "제60회",
    q: "다음에서 설명하는 나라는? (철이 많이 생산되어 낙랑·왜 등에 수출하였으며, 읍락 간의 경계를 중시하였다.)",
    options: ["고구려", "부여", "동예", "변한", "옥저"],
    answer: 3,
    exp: "변한(변진)은 철 생산이 풍부하여 낙랑·왜 등에 수출하였고, 철이 화폐처럼 사용되었습니다. 또한 삼한은 읍락 간 경계 침범 시 노비·소·말로 배상하는 책화 풍습이 있었으며, 이는 동예에도 해당됩니다. 하지만 철 수출은 변한의 특징입니다."
  },
  {
    round: "제60회",
    q: "백제 근초고왕의 업적으로 옳은 것은?",
    options: ["불교를 처음으로 수용하였다.", "22담로에 왕족을 파견하였다.", "마한을 병합하고 황해도까지 진출하였다.", "사비로 도읍을 옮기고 국호를 남부여로 바꾸었다.", "신라와 동맹을 맺어 고구려에 대항하였다."],
    answer: 2,
    exp: "근초고왕(346~375)은 백제의 전성기를 이끌었습니다. 마한 전 지역을 통합하고 북으로 황해도, 남으로 전라도까지 영토를 넓혔습니다. 22담로에 왕족 파견은 무령왕, 사비 천도는 성왕의 정책입니다."
  },
  {
    round: "제60회",
    q: "통일 신라의 지방 행정 제도에 대한 설명으로 옳은 것은?",
    options: ["전국을 5도 양계로 나누어 다스렸다.", "9주 5소경을 설치하여 지방을 통치하였다.", "8도 체제를 갖추어 지방관을 파견하였다.", "22담로에 왕족을 보내어 지방을 통제하였다.", "향·부곡·소를 특수 행정 구역으로 운영하였다."],
    answer: 1,
    exp: "통일 신라는 전국을 9주로 나누고, 수도 편중을 극복하기 위해 5소경(중원경·북원경·금관경·서원경·남원경)을 설치하였습니다. 5도 양계는 고려, 8도는 조선의 지방 행정 제도입니다."
  },
  {
    round: "제60회",
    q: "고려 태조 왕건이 실시한 정책으로 옳은 것은?",
    options: ["과거제를 처음으로 도입하였다.", "노비안검법으로 호족 세력을 약화시켰다.", "흑창을 설치하여 빈민을 구제하였다.", "12목을 설치하고 지방관을 파견하였다.", "전시과 제도를 처음으로 마련하였다."],
    answer: 2,
    exp: "고려 태조는 흑창(후에 의창)을 설치하여 봄에 곡식을 빌려주고 가을에 거두는 빈민 구제 제도를 운영하였습니다. 또한 기인 제도, 사심관 제도, 훈요 10조 등을 시행하였습니다. 과거제와 노비안검법은 광종, 12목 설치는 성종의 정책입니다."
  },
  {
    round: "제60회",
    q: "고려시대 불교 문화에 대한 설명으로 옳지 않은 것은?",
    options: ["의천이 교관겸수를 주장하며 천태종을 창시하였다.", "지눌이 정혜쌍수와 돈오점수를 주장하였다.", "팔만대장경은 몽골 침략 때 부처의 힘으로 나라를 지키려 제작하였다.", "원효가 화쟁 사상으로 불교 종파 간의 갈등을 해소하려 하였다.", "혜심이 유불 일치설을 주장하며 심성의 도야를 강조하였다."],
    answer: 3,
    exp: "원효는 통일 신라 시대의 승려로, 화쟁 사상과 아미타 신앙을 통해 불교의 대중화에 기여하였습니다. 고려 불교 문화로는 의천의 천태종(교종 통합), 지눌의 조계종(선종 중심), 팔만대장경 제작, 혜심의 유불 일치설 등이 있습니다."
  },
  {
    round: "제60회",
    q: "조선 성종 때의 사실로 옳은 것은?",
    options: ["훈민정음을 창제하였다.", "경국대전을 완성·반포하였다.", "삼포왜란이 발생하였다.", "사림이 처음으로 등용되었다.", "직전법을 처음 실시하였다."],
    answer: 1,
    exp: "조선 성종은 세조 때 시작된 경국대전 편찬을 완성(1485)하여 반포하였습니다. 이로써 조선의 기본 법전이 마련되었습니다. 훈민정음은 세종, 삼포왜란은 중종, 사림 등용은 성종 때 맞으나 경국대전 완성이 대표 업적입니다."
  },
  {
    round: "제60회",
    q: "병자호란(1636)의 결과로 옳은 것은?",
    options: ["조선이 청과 대등한 관계를 맺었다.", "인조가 삼전도에서 청 태종에게 항복하였다.", "소현세자가 명에 볼모로 잡혀갔다.", "조선은 나선 정벌에 참여하게 되었다.", "척화비를 전국에 세워 통상 수교를 거부하였다."],
    answer: 1,
    exp: "병자호란 결과 인조는 삼전도(현 서울 송파구)에서 청 태종에게 삼배구고두례(三拜九叩頭禮)로 항복하였습니다. 소현세자와 봉림대군은 청에 볼모로 잡혀갔고, 조선은 청의 요청으로 나선 정벌에 참여하였습니다."
  },
  // ── 61회 ──────────────────────────────────────────────
  {
    round: "제61회",
    q: "구석기 시대의 생활 모습으로 옳은 것은?",
    options: ["가락바퀴로 실을 뽑아 옷을 만들었다.", "고인돌을 만들어 지배층의 무덤으로 사용하였다.", "뗀석기를 사용하여 사냥과 채집을 하였다.", "벼농사를 짓고 반달 돌칼로 수확하였다.", "미송리식 토기를 만들어 사용하였다."],
    answer: 2,
    exp: "구석기 시대에는 주먹도끼, 찍개 등 뗀석기(타제석기)를 제작하여 사냥과 채집 생활을 하였습니다. 가락바퀴는 신석기, 고인돌과 반달 돌칼·미송리식 토기는 청동기 시대에 해당합니다."
  },
  {

// ── 상태 관리 ──────────────────────────────────────────
let remainPool = [];   // 아직 안 나온 문제 인덱스
let quizSet = [];      // 현재 10문제
let userAnswers = [];
let currentIdx = 0;

function initPool() {
  remainPool = ALL_QUESTIONS.map((_, i) => i);
  shuffleArr(remainPool);
}

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function updateStartInfo() {
  document.getElementById('totalCount').textContent = ALL_QUESTIONS.length;
  document.getElementById('remainCount').textContent = remainPool.length;
}

function startQuiz() {
  if (remainPool.length < 10) initPool();

  quizSet = remainPool.splice(0, 10).map(i => ALL_QUESTIONS[i]);
  userAnswers = new Array(10).fill(null);
  currentIdx = 0;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';

  updateStartInfo();
  renderQuestion();
}

function renderQuestion() {
  const q = quizSet[currentIdx];
  const total = 10;

  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${total}`;
  const pct = Math.round((currentIdx / total) * 100);
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('questionNum').textContent = `문제 ${currentIdx + 1}`;
  document.getElementById('questionRound').textContent = q.round;
  document.getElementById('questionText').textContent = q.q;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (userAnswers[currentIdx] === i ? ' selected' : '');
    div.innerHTML = `<span class="option-num">${i + 1}</span><span class="option-text">${opt}</span>`;
    div.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); };
    wrap.appendChild(div);
  });

  document.getElementById('btnPrev').disabled = currentIdx === 0;
  const isLast = currentIdx === total - 1;
  document.getElementById('btnNext').textContent = isLast ? '결과 보기' : '다음';
}

function prevQuestion() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIdx < 9) { currentIdx++; renderQuestion(); }
  else showResult();
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  let score = 0;
  quizSet.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
  document.getElementById('scoreNum').textContent = score;

  const titles = ['더 노력이 필요해요', '기초를 다져보세요', '절반은 맞혔어요!', '잘하고 있어요!', '훌륭해요!', '완벽합니다!'];
  const descs  = ['포기하지 말고 다시 도전!', '오답 해설을 꼼꼼히 읽어보세요.', '꾸준히 연습하면 합격 가능해요!', '조금만 더 하면 심화 1급!', '거의 다 왔어요!', '심화 1급 합격 실력입니다!'];
  const si = Math.min(score, 5);
  document.getElementById('scoreTitle').textContent = titles[si];
  document.getElementById('scoreDesc').textContent = descs[si];
  document.getElementById('remainInfo').textContent = `남은 문제 ${remainPool.length}개 (전체 ${ALL_QUESTIONS.length}개)`;

  const nextBtn = document.getElementById('btnNextRound');
  nextBtn.textContent = remainPool.length >= 10 ? '다음 10문제 풀기' : `처음부터 다시 (전체 ${ALL_QUESTIONS.length}문제 리셋)`;

  const wrap = document.getElementById('reviewWrap');
  wrap.innerHTML = '';
  quizSet.forEach((q, i) => {
    const correct = userAnswers[i] === q.answer;
    const div = document.createElement('div');
    div.className = 'review-item' + (correct ? '' : ' wrong');
    const myAns = userAnswers[i] !== null
      ? `내 답: ${userAnswers[i] + 1}번 — ${q.options[userAnswers[i]]}`
      : '미응답';
    div.innerHTML = `
      <div class="review-q">${q.round} · 문제 ${i + 1} · ${correct ? '✓ 정답' : '✗ 오답'}</div>
      <div class="review-question">${q.q}</div>
      <div class="review-answers">
        <div class="answer-correct">정답: ${q.answer + 1}번 — ${q.options[q.answer]}</div>
        ${!correct ? `<div class="answer-wrong">${myAns}</div>` : ''}
      </div>
      <div class="review-explanation"><strong>해설</strong>${q.exp}</div>
    `;
    wrap.appendChild(div);
  });
}

// 초기화
initPool();
updateStartInfo();
</script>
