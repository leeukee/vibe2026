<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국사능력검정시험 심화 연습</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 40px 0 30px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 8px;
    }

    header p {
      color: #aac8e4;
      font-size: 0.95rem;
    }

    #startScreen {
      text-align: center;
      padding: 60px 20px;
    }

    #startScreen .badge {
      display: inline-block;
      background: rgba(255,215,0,0.15);
      border: 1px solid #ffd700;
      color: #ffd700;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    #startScreen h2 {
      font-size: 1.4rem;
      margin-bottom: 14px;
      color: #e0f0ff;
    }

    #startScreen p {
      color: #aac8e4;
      line-height: 1.7;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .btn-start {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a1a;
      border: none;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255,215,0,0.5);
    }

    #quizScreen { display: none; }

    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #aac8e4;
      margin-bottom: 8px;
    }

    .progress-bar {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .question-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .question-num {
      font-size: 0.8rem;
      color: #ffd700;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .question-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #e8f4ff;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .option:hover {
      background: rgba(255,215,0,0.12);
      border-color: rgba(255,215,0,0.4);
    }

    .option.selected {
      background: rgba(255,215,0,0.18);
      border-color: #ffd700;
    }

    .option.correct {
      background: rgba(46,213,115,0.2);
      border-color: #2ed573;
    }

    .option.wrong {
      background: rgba(255,71,87,0.2);
      border-color: #ff4757;
    }

    .option-num {
      font-size: 0.85rem;
      font-weight: 700;
      color: #ffd700;
      min-width: 20px;
      margin-top: 1px;
    }

    .option-text {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #ddeeff;
    }

    .nav-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .btn-nav {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-nav:hover { background: rgba(255,255,255,0.18); }

    .btn-nav.primary {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border: none;
      color: #1a1a1a;
      font-weight: 700;
    }

    .btn-nav.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(255,215,0,0.4);
    }

    .btn-nav:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    #resultScreen { display: none; }

    .score-card {
      text-align: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 40px 30px;
      margin-bottom: 30px;
    }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 30px rgba(255,215,0,0.4);
    }

    .score-num {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }

    .score-label {
      font-size: 0.75rem;
      color: #1a1a1a;
      font-weight: 600;
    }

    .score-card h2 {
      font-size: 1.3rem;
      color: #ffd700;
      margin-bottom: 8px;
    }

    .score-card p {
      color: #aac8e4;
      font-size: 0.9rem;
    }

    .review-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }

    .review-item {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
      border-left: 3px solid #2ed573;
    }

    .review-item.wrong {
      border-left-color: #ff4757;
    }

    .review-q {
      font-size: 0.8rem;
      color: #aac8e4;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .review-question {
      font-size: 0.95rem;
      color: #e8f4ff;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .review-answers {
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .answer-correct { color: #2ed573; font-weight: 600; }
    .answer-wrong { color: #ff4757; }

    .review-explanation {
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88rem;
      color: #c8e0f4;
      line-height: 1.7;
    }

    .review-explanation strong {
      color: #ffd700;
      display: block;
      margin-bottom: 4px;
    }

    .btn-retry {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a1a;
      border: none;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.2s;
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,215,0,0.4);
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>한국사능력검정시험</h1>
    <p>심화 (1·2급) 기출 문제 연습</p>
  </header>

  <div id="startScreen">
    <div class="badge">심화 기출 기반 30문제</div>
    <h2>실력을 확인해보세요</h2>
    <p>
      선사시대부터 현대사까지<br>
      한국사능력검정시험 심화 기출 문제 30선 중<br>
      랜덤으로 <strong style="color:#ffd700">10문제</strong>가 출제됩니다.<br><br>
      모든 문제를 풀면 상세 해설을 확인할 수 있습니다.
    </p>
    <button class="btn-start" onclick="startQuiz()">문제 풀기 시작</button>
  </div>

  <div id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressText">1 / 10</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-num" id="questionNum">문제 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <div class="nav-wrap">
      <button class="btn-nav" id="btnPrev" onclick="prevQuestion()">이전</button>
      <button class="btn-nav primary" id="btnNext" onclick="nextQuestion()">다음</button>
    </div>
  </div>

  <div id="resultScreen">
    <div class="score-card">
      <div class="score-circle">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">/ 10</div>
      </div>
      <h2 id="scoreTitle"></h2>
      <p id="scoreDesc"></p>
    </div>

    <div class="review-title">문제별 해설</div>
    <div id="reviewWrap"></div>

    <button class="btn-retry" onclick="retryQuiz()">다시 풀기</button>
  </div>
</div>

<script>
const allQuestions = [
  {
    q: "다음 유물이 사용된 시대의 생활 모습으로 옳은 것은? (주먹도끼, 찍개)",
    options: ["빗살무늬 토기를 만들어 식량을 저장하였다.", "가락바퀴를 이용해 실을 뽑고 옷을 만들었다.", "동굴이나 막집에 살며 무리를 지어 이동하였다.", "청동기로 만든 거울과 방울을 제사에 사용하였다.", "철제 농기구를 이용해 농사를 짓기 시작하였다."],
    answer: 2,
    exp: "주먹도끼와 찍개는 구석기 시대의 대표적인 뗀석기입니다. 구석기 시대 사람들은 동굴이나 강가에 막집을 짓고 살았으며, 식량을 찾아 무리 지어 이동하는 생활을 하였습니다. 빗살무늬 토기는 신석기, 청동거울은 청동기 시대의 유물입니다."
  },
  {
    q: "고조선의 사회 모습을 알 수 있는 8조법 중 현재 전해지는 조항에 해당하지 않는 것은?",
    options: ["사람을 죽인 자는 즉시 사형에 처한다.", "남에게 상처를 입힌 자는 곡식으로 갚는다.", "남의 물건을 훔친 자는 노비로 삼는다.", "도둑질한 자의 가족을 연좌하여 처벌한다.", "남의 물건을 훔쳤다가 용서받으려면 50만 전을 내야 한다."],
    answer: 3,
    exp: "고조선 8조법 중 현재 전해지는 3개 조항은 ①살인자는 즉시 사형, ②상해는 곡물로 배상, ③절도는 노비로 삼거나 50만 전으로 속죄입니다. 가족 연좌 처벌은 전해지지 않는 내용이며, 개인의 생명·신체·재산을 중시하는 사유 재산 및 계급 사회였음을 보여줍니다."
  },
  {
    q: "고구려의 발전에 관한 설명으로 옳은 것은?",
    options: ["근초고왕 때 마한을 통합하고 요서 지방까지 진출하였다.", "광개토대왕이 신라에 침입한 왜를 물리치고 영토를 넓혔다.", "진흥왕이 화랑도를 개편하고 한강 유역을 차지하였다.", "문무왕 때 삼국 통일을 완성하였다.", "장수왕이 신라로 수도를 옮기고 남진 정책을 추진하였다."],
    answer: 1,
    exp: "광개토대왕은 신라의 요청으로 군대를 파견해 왜구를 물리치고 만주와 한반도 북부에 걸친 넓은 영토를 확보하였습니다. 근초고왕과 진흥왕·문무왕은 각각 백제와 신라의 왕이며, 장수왕은 평양으로 천도하였습니다."
  },
  {
    q: "신라의 골품제에 대한 설명으로 옳지 않은 것은?",
    options: ["혈통에 따라 사회적 활동 범위와 관직 진출을 제한하였다.", "성골은 부모 모두 왕족인 최고 신분으로, 왕위를 계승하였다.", "6두품은 아찬까지만 오를 수 있어 '득난'이라 불렸다.", "골품에 따라 집의 크기, 복식, 수레 등 일상생활도 규제받았다.", "6두품은 중앙 관직과 군사권을 독점하였다."],
    answer: 4,
    exp: "중앙 관직과 군사권을 독점한 것은 진골 귀족입니다. 6두품은 학문과 실무 분야에서 활동하였으나 최고 관직(17관등 중 6등 아찬)까지만 오를 수 있었습니다. 이를 '득난(得難)'이라 불렀습니다."
  },
  {
    q: "발해에 대한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 대조영이 고구려 유민과 말갈인을 이끌고 건국하였다. ㄴ. 전성기 때 해동성국이라 불렸다. ㄷ. 신라와 함께 남북국 시대를 형성하였다. ㄹ. 9세기 초 거란의 침략으로 멸망하였다.",
    options: ["ㄱ, ㄴ", "ㄱ, ㄴ, ㄷ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"],
    answer: 1,
    exp: "ㄱ,ㄴ,ㄷ은 모두 옳습니다. 발해는 대조영이 698년 건국하였고, 선왕 때 전성기로 '해동성국'이라 불렸으며 신라와 남북국 시대를 이루었습니다. ㄹ은 '9세기 초'가 틀렸습니다 — 발해는 926년(10세기) 거란(요)의 침략으로 멸망하였습니다."
  },
  {
    q: "고려 광종이 실시한 정책으로 옳은 것은?",
    options: ["사심관 제도와 기인 제도를 실시하였다.", "과거제를 도입하고 노비안검법을 실시하였다.", "전시과 제도를 처음 마련하였다.", "12목을 설치하고 지방관을 파견하였다.", "불교를 억압하고 성리학을 통치 이념으로 삼았다."],
    answer: 1,
    exp: "고려 광종은 왕권 강화를 위해 956년 노비안검법(불법 노비 해방), 958년 쌍기의 건의로 과거제 도입, 960년 백관의 공복 제정 등을 실시하였습니다. 사심관·기인 제도는 태조, 12목 설치는 성종의 정책입니다."
  },
  {
    q: "고려시대 무신 정변(1170)의 원인으로 옳지 않은 것은?",
    options: ["문신에 비해 무신이 차별 대우를 받았다.", "무신들이 낮은 관직과 경제적 불이익을 받았다.", "의종의 실정과 향락이 무신들의 불만을 키웠다.", "보현원에서 정중부 등이 무신 정변을 일으켰다.", "최씨 정권이 교정도감을 통해 권력을 독점하였다."],
    answer: 4,
    exp: "교정도감을 통한 최씨 정권의 권력 독점은 무신 정변의 원인이 아니라, 정변 이후 최충헌이 설치한 기구입니다. 무신 정변의 주요 원인은 문신 우대·무신 차별, 의종의 실정, 누적된 경제적 불이익 등입니다."
  },
  {
    q: "고려 원 간섭기에 나타난 사실이 아닌 것은?",
    options: ["왕실 호칭이 격하되어 '폐하'가 '전하'로 바뀌었다.", "몽골풍(변발, 몽골 복식)이 유행하였다.", "결혼도감을 통해 공녀가 원에 보내졌다.", "망이·망소이가 봉기를 일으켰다.", "정동행성이 설치되어 내정 간섭을 받았다."],
    answer: 3,
    exp: "망이·망소이의 봉기(1176)는 무신 집권기인 명종 때 일어난 사건으로, 원 간섭기(1270년 이후) 이전의 일입니다. 원 간섭기에는 왕호 격하, 몽골풍 유행, 공녀 차출, 정동행성 설치 등이 있었습니다."
  },
  {
    q: "조선 태종이 실시한 정책으로 옳은 것은?",
    options: ["집현전을 설치하여 학문을 장려하였다.", "6조 직계제를 실시하고 사병을 혁파하였다.", "경국대전을 완성하여 법치의 기반을 마련하였다.", "훈민정음을 창제하여 문자 생활을 혁신하였다.", "향약을 보급하여 향촌 자치를 강화하였다."],
    answer: 1,
    exp: "태종은 왕권 강화를 위해 6조 직계제(6조가 의정부를 거치지 않고 왕에게 직접 보고)를 실시하고, 사병을 혁파하여 병권을 장악하였습니다. 집현전·훈민정음은 세종, 경국대전 완성은 성종의 업적입니다."

let quizQuestions = [];
let userAnswers = [];
let currentIdx = 0;

function shuffle(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

function startQuiz() {
  quizQuestions = shuffle(allQuestions).slice(0, 10);
  userAnswers = new Array(10).fill(null);
  currentIdx = 0;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';

  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[currentIdx];
  const total = 10;

  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${total}`;
  document.getElementById('progressPercent').textContent = `${Math.round((currentIdx / total) * 100)}%`;
  document.getElementById('progressFill').style.width = `${(currentIdx / total) * 100}%`;
  document.getElementById('questionNum').textContent = `문제 ${currentIdx + 1}`;
  document.getElementById('questionText').textContent = q.q;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (userAnswers[currentIdx] === i ? ' selected' : '');
    div.innerHTML = `<span class="option-num">${i + 1}</span><span class="option-text">${opt}</span>`;
    div.onclick = () => selectOption(i);
    wrap.appendChild(div);
  });

  document.getElementById('btnPrev').disabled = currentIdx === 0;
  const isLast = currentIdx === total - 1;
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = isLast ? '결과 보기' : '다음';
}

function selectOption(i) {
  userAnswers[currentIdx] = i;
  renderQuestion();
}

function prevQuestion() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIdx < 9) {
    currentIdx++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  let score = 0;
  quizQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  document.getElementById('scoreNum').textContent = score;

  const titles = ['더 노력이 필요해요', '기초를 다져보세요', '절반은 맞혔어요!', '잘하고 있어요!', '훌륭해요!', '완벽합니다!'];
  const descs = [
    '포기하지 말고 다시 도전해보세요.',
    '오답 해설을 꼼꼼히 읽어보세요.',
    '꾸준히 연습하면 합격할 수 있어요!',
    '조금만 더 하면 심화 1급이에요!',
    '거의 다 왔어요! 한 번 더 도전해보세요.',
    '심화 1급 합격 실력입니다!'
  ];
  document.getElementById('scoreTitle').textContent = titles[Math.min(score, 5)];
  document.getElementById('scoreDesc').textContent = descs[Math.min(score, 5)];

  const reviewWrap = document.getElementById('reviewWrap');
  reviewWrap.innerHTML = '';
  quizQuestions.forEach((q, i) => {
    const correct = userAnswers[i] === q.answer;
    const div = document.createElement('div');
    div.className = 'review-item' + (correct ? '' : ' wrong');
    const myAns = userAnswers[i] !== null
      ? `내 답: ${userAnswers[i] + 1}번 — ${q.options[userAnswers[i]]}`
      : '미응답';
    div.innerHTML = `
      <div class="review-q">문제 ${i + 1} · ${correct ? '✓ 정답' : '✗ 오답'}</div>
      <div class="review-question">${q.q}</div>
      <div class="review-answers">
        <div class="answer-correct">정답: ${q.answer + 1}번 — ${q.options[q.answer]}</div>
        ${!correct ? `<div class="answer-wrong">${myAns}</div>` : ''}
      </div>
      <div class="review-explanation"><strong>해설</strong>${q.exp}</div>
    `;
    reviewWrap.appendChild(div);
  });
}

function retryQuiz() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
}
