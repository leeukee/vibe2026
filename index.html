<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국사능력검정시험 심화 연습</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 780px; margin: 0 auto; }
    header { text-align: center; padding: 36px 0 24px; }
    header h1 { font-size: 1.75rem; font-weight: 700; color: #ffd700; margin-bottom: 6px; }
    header p { color: #aac8e4; font-size: 0.9rem; }

    #startScreen { text-align: center; padding: 50px 20px; }
    .badge {
      display: inline-block;
      background: rgba(255,215,0,0.15);
      border: 1px solid #ffd700;
      color: #ffd700;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      margin-bottom: 24px;
    }
    #startScreen h2 { font-size: 1.3rem; margin-bottom: 12px; color: #e0f0ff; }
    #startScreen p { color: #aac8e4; line-height: 1.8; margin-bottom: 30px; font-size: 0.93rem; }
    .pool-info { display: flex; justify-content: center; gap: 20px; margin-bottom: 36px; flex-wrap: wrap; }
    .pool-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.82rem;
      color: #c8e0f4;
    }
    .pool-chip span { display: block; font-size: 1.1rem; font-weight: 700; color: #ffd700; margin-bottom: 2px; }
    .btn-start {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a1a; border: none;
      padding: 15px 46px; font-size: 1.05rem; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,215,0,0.5); }

    #quizScreen { display: none; }
    .progress-wrap { margin-bottom: 22px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 0.83rem; color: #aac8e4; margin-bottom: 7px; }
    .progress-bar { background: rgba(255,255,255,0.15); border-radius: 10px; height: 7px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #ffd700, #ffaa00); height: 100%; border-radius: 10px; transition: width 0.4s ease; }

    .question-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 26px; margin-bottom: 18px;
    }
    .question-meta { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .q-num { font-size: 0.78rem; color: #ffd700; font-weight: 700; letter-spacing: 0.5px; }
    .q-round {
      font-size: 0.72rem;
      background: rgba(255,215,0,0.15);
      border: 1px solid rgba(255,215,0,0.3);
      color: #ffd700; padding: 2px 8px; border-radius: 10px;
    }
    .question-text { font-size: 1.02rem; line-height: 1.75; color: #e8f4ff; margin-bottom: 22px; }
    .options { display: flex; flex-direction: column; gap: 9px; }
    .option {
      display: flex; align-items: flex-start; gap: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 13px 15px;
      cursor: pointer; transition: all 0.18s;
    }
    .option:hover { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.4); }
    .option.selected { background: rgba(255,215,0,0.18); border-color: #ffd700; }
    .option-num { font-size: 0.82rem; font-weight: 700; color: #ffd700; min-width: 18px; margin-top: 1px; }
    .option-text { font-size: 0.93rem; line-height: 1.5; color: #ddeeff; }

    .nav-wrap { display: flex; justify-content: space-between; align-items: center; }
    .btn-nav {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 11px 26px;
      border-radius: 10px; cursor: pointer; font-size: 0.93rem; transition: all 0.18s;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.18); }
    .btn-nav.primary {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border: none; color: #1a1a1a; font-weight: 700;
    }
    .btn-nav.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(255,215,0,0.4); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    #resultScreen { display: none; }
    .score-card {
      text-align: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 20px; padding: 38px 28px; margin-bottom: 28px;
    }
    .score-circle {
      width: 110px; height: 110px; border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 0 28px rgba(255,215,0,0.4);
    }
    .score-num { font-size: 2rem; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .score-label { font-size: 0.72rem; color: #1a1a1a; font-weight: 600; }
    .score-card h2 { font-size: 1.2rem; color: #ffd700; margin-bottom: 6px; }
    .score-card p { color: #aac8e4; font-size: 0.88rem; }
    .remain-info { color: #7ec8e3; font-size: 0.82rem; margin-top: 10px; }

    .review-title {
      font-size: 1.05rem; font-weight: 700; color: #ffd700;
      margin-bottom: 14px; padding-bottom: 9px;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .review-item {
      background: rgba(255,255,255,0.06);
      border-radius: 12px; padding: 18px; margin-bottom: 12px;
      border-left: 3px solid #2ed573;
    }
    .review-item.wrong { border-left-color: #ff4757; }
    .review-q { font-size: 0.77rem; color: #aac8e4; margin-bottom: 3px; font-weight: 600; }
    .review-question { font-size: 0.93rem; color: #e8f4ff; margin-bottom: 9px; line-height: 1.6; }
    .review-answers { font-size: 0.85rem; margin-bottom: 10px; }
    .answer-correct { color: #2ed573; font-weight: 600; }
    .answer-wrong { color: #ff4757; }
    .review-explanation {
      background: rgba(255,255,255,0.06);
      border-radius: 8px; padding: 11px 13px;
      font-size: 0.86rem; color: #c8e0f4; line-height: 1.7;
    }
    .review-explanation strong { color: #ffd700; display: block; margin-bottom: 3px; }
    .btn-next-round {
      display: block; width: 100%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a1a; border: none;
      padding: 15px; font-size: 0.98rem; font-weight: 700;
      border-radius: 12px; cursor: pointer; margin-top: 22px;
      transition: all 0.2s;
    }
    .btn-next-round:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,0.4); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>한국사능력검정시험</h1>
    <p>심화 (1·2급) 기출 문제 연습</p>
  </header>

  <div id="startScreen">
    <div class="badge">70회~77회 기출 기반</div>
    <h2>실력을 확인해보세요</h2>
    <p>
      각 회차 기출 문제에서 랜덤으로 <strong style="color:#ffd700">10문제</strong>가 출제됩니다.<br>
      직전 라운드에 나왔던 문제는 바로 다음에 나오지 않습니다.
    </p>
    <div class="pool-info">
      <div class="pool-chip"><span id="totalCount">0</span>전체 문제</div>
      <div class="pool-chip"><span id="availCount">0</span>출제 가능</div>
      <div class="pool-chip"><span>8회차</span>수록 회차</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">문제 풀기 시작</button>
  </div>

  <div id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressText">1 / 10</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="question-card">
      <div class="question-meta">
        <div class="q-num" id="questionNum">문제 1</div>
        <div class="q-round" id="questionRound"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>
    <div class="nav-wrap">
      <button class="btn-nav" id="btnPrev" onclick="prevQuestion()">이전</button>
      <button class="btn-nav primary" id="btnNext" onclick="nextQuestion()">다음</button>
    </div>
  </div>

  <div id="resultScreen">
    <div class="score-card">
      <div class="score-circle">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">/ 10</div>
      </div>
      <h2 id="scoreTitle"></h2>
      <p id="scoreDesc"></p>
      <p class="remain-info" id="remainInfo"></p>
    </div>
    <div class="review-title">문제별 해설</div>
    <div id="reviewWrap"></div>
    <button class="btn-next-round" id="btnNextRound" onclick="startQuiz()">다음 10문제 풀기</button>
  </div>
</div>

<script>
const ALL_Q = [
  // ── 제70회 ─────────────────────────────────────────────────
  { round:"제70회", q:"신석기 시대의 생활 모습으로 옳은 것은?",
    options:["주먹도끼를 이용해 사냥을 하였다.","농경과 목축이 시작되었다.","청동 도구를 만들어 사용하였다.","국가가 성립하고 왕이 등장하였다.","철제 농기구로 깊이갈이를 하였다."],
    answer:1, exp:"신석기 시대에는 농경과 목축이 처음 시작되었고, 갈돌·갈판 등 간석기를 사용하였습니다. 빗살무늬 토기를 만들고 가락바퀴로 옷을 짰습니다. 주먹도끼는 구석기, 청동기는 청동기 시대, 철제 농기구는 철기 시대입니다." },

  { round:"제70회", q:"고구려 장수왕의 업적으로 옳은 것은?",
    options:["율령을 반포하고 태학을 설립하였다.","살수에서 수나라 군대를 격파하였다.","평양으로 천도하고 백제 한성을 함락하였다.","광개토대왕릉비를 직접 건립하였다.","당군을 안시성에서 격퇴하였다."],
    answer:2, exp:"장수왕(413~491)은 427년 평양으로 천도하고 남진 정책을 추진하여 475년 백제 한성을 함락하고 개로왕을 살해하였습니다. 율령·태학은 소수림왕, 살수대첩은 을지문덕, 안시성 전투는 양만춘의 업적입니다." },

  { round:"제70회", q:"통일 신라 원성왕이 실시한 제도로 옳은 것은?",
    options:["9주 5소경 체제를 완성하였다.","독서삼품과를 실시하여 유학 실력으로 관리를 등용하였다.","관료전을 지급하고 녹읍을 폐지하였다.","국학을 설립하였다.","화백 회의를 강화하였다."],
    answer:1, exp:"원성왕은 788년 독서삼품과를 실시하여 유교 경전 이해 수준에 따라 관리를 등용하려 하였습니다. 귀족들의 반발로 실효는 크지 않았습니다. 9주 5소경·국학·녹읍 폐지는 신문왕의 업적입니다." },

  { round:"제70회", q:"고려 최씨 무신 정권에 대한 설명으로 옳지 않은 것은?",
    options:["최충헌은 교정도감을 설치하여 권력을 강화하였다.","최우는 정방을 설치하여 인사권을 장악하였다.","최우는 삼별초를 조직하였다.","최씨 정권 시기에 몽골의 침략이 시작되었다.","최씨 정권은 친원 세력으로 몽골과 협력하였다."],
    answer:4, exp:"최씨 정권은 몽골 침략에 맞서 강화도로 천도하여(1232) 30년간 항전하였습니다. 친원 세력이 된 것은 최씨 정권 붕괴 이후의 권문세족입니다." },

  { round:"제70회", q:"임진왜란 중 행주 대첩에 대한 설명으로 옳은 것은?",
    options:["이순신이 거북선으로 왜 수군을 격파하였다.","권율이 행주산성에서 왜군을 물리쳤다.","곽재우가 홍의 장군으로 이끈 전투이다.","명나라 군대가 주력이 되어 싸웠다.","이 전투 이후 왜군이 즉시 철수하였다."],
    answer:1, exp:"행주 대첩(1593)은 권율 장군이 행주산성에서 왜군의 공격을 격퇴한 전투입니다. 부녀자들이 행주치마에 돌을 날랐다는 이야기로 유명합니다. 이순신의 활약은 한산도 대첩, 곽재우는 다른 전투에서 활약하였습니다." },

  { round:"제70회", q:"조선 후기 세도 정치의 특징으로 옳은 것은?",
    options:["왕권이 강화되어 강력한 통치가 이루어졌다.","안동 김씨, 풍양 조씨 등 특정 가문이 비변사를 장악하였다.","탕평책이 효과를 발휘하여 붕당 간 균형이 유지되었다.","진보적인 개혁 정치가 실현되었다.","지방 토호들의 세력이 약화되었다."],
    answer:1, exp:"세도 정치(순조~철종, 1800~1863)는 안동 김씨·풍양 조씨 등 외척 가문이 비변사를 장악한 시기입니다. 삼정 문란, 매관매직, 민란 빈발이 특징입니다." },

  { round:"제70회", q:"4·19 혁명 이후 수립된 장면 내각의 특징으로 옳은 것은?",
    options:["대통령 중심제와 단원제 국회를 채택하였다.","내각 책임제와 양원제를 채택하였다.","5·16 군사 정변으로 붕괴되기까지 10년간 지속되었다.","강경한 반공 정책으로 북한과 대립하였다.","경제 개발 5개년 계획을 완성하였다."],
    answer:1, exp:"4·19 혁명 이후 헌법 개정으로 내각 책임제(국무총리가 실권)와 양원제(참·민의원)가 채택되었습니다. 장면 내각은 1년도 안 되어(1960.8~1961.5) 5·16 군사 정변으로 붕괴되었습니다." },

  { round:"제70회", q:"을미사변(1895) 이후 전개된 사실로 옳은 것은?",
    options:["명성황후가 일본 낭인들에게 시해되었다.","고종이 러시아 공사관으로 피신하는 아관파천이 일어났다.","조선이 일본에 강제로 합병되었다.","독립 협회가 창설되어 독립문을 건립하였다.","갑오개혁이 처음으로 시작되었다."],
    answer:1, exp:"을미사변 이후 신변의 위협을 느낀 고종은 1896년 2월 러시아 공사관으로 피신하는 아관파천을 단행하였습니다. 이로 인해 친러 내각이 수립되고 을미개혁이 중단되었습니다. 을미사변 자체는 1895년의 사건입니다." },

  // ── 제71회 ─────────────────────────────────────────────────
  { round:"제71회", q:"청동기 시대의 특징으로 옳지 않은 것은?",
    options:["비파형 동검이 사용되었다.","고인돌은 지배층의 무덤이다.","반달 돌칼로 이삭을 수확하였다.","미송리식 토기가 사용되었다.","철제 무기가 보급되어 정복 전쟁이 활발해졌다."],
    answer:4, exp:"철제 무기의 보급은 철기 시대의 특징입니다. 청동기 시대의 특징으로는 비파형 동검, 고인돌, 반달 돌칼, 미송리식 토기, 거친무늬 거울 등이 있습니다. 청동기는 제사나 권위의 상징으로 사용되었습니다." },

  { round:"제71회", q:"백제 성왕의 업적으로 옳은 것은?",
    options:["마한을 병합하고 요서 지방에 진출하였다.","사비로 천도하고 국호를 남부여로 바꾸었다.","22담로에 왕족을 파견하였다.","웅진으로 천도하였다.","고구려 광개토대왕에게 패배하여 한성을 잃었다."],
    answer:1, exp:"백제 성왕은 538년 웅진에서 사비(부여)로 천도하고 국호를 남부여로 바꾸었습니다. 신라와 나제 동맹으로 한강 유역을 일시 회복하였으나 관산성 전투에서 전사하였습니다. 22담로는 무령왕의 정책입니다." },

  { round:"제71회", q:"신라 하대의 사회 모습으로 옳은 것은?",
    options:["골품제가 철저히 유지되어 사회가 안정되었다.","진골 귀족들의 왕위 쟁탈전이 빈번하게 일어났다.","독서삼품과로 인재가 원활히 등용되었다.","후삼국이 통일되어 안정을 되찾았다.","6두품이 정치권력을 장악하였다."],

function getAvailableIndices() {
  const all = ALL_Q.map((_, i) => i);
  const avail = all.filter(i => !lastRoundSet.has(i));
  return avail.length >= 10 ? avail : all;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStartInfo() {
  document.getElementById('totalCount').textContent = ALL_Q.length;
  document.getElementById('availCount').textContent = getAvailableIndices().length;
}

function startQuiz() {
  const avail = shuffle(getAvailableIndices());
  const picked = avail.slice(0, 10);

  lastRoundSet = new Set(picked);
  quizSet = picked.map(i => ({ ...ALL_Q[i], _idx: i }));
  userAnswers = new Array(10).fill(null);
  currentIdx = 0;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';

  updateStartInfo();
  renderQuestion();
}

function renderQuestion() {
  const q = quizSet[currentIdx];

  document.getElementById('progressText').textContent = `${currentIdx + 1} / 10`;
  const pct = Math.round((currentIdx / 10) * 100);
  document.getElementById('progressPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('questionNum').textContent = `문제 ${currentIdx + 1}`;
  document.getElementById('questionRound').textContent = q.round;
  document.getElementById('questionText').textContent = q.q;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (userAnswers[currentIdx] === i ? ' selected' : '');
    div.innerHTML = `<span class="option-num">${i + 1}</span><span class="option-text">${opt}</span>`;
    div.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); };
    wrap.appendChild(div);
  });

  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').textContent = currentIdx === 9 ? '결과 보기' : '다음';
}

function prevQuestion() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIdx < 9) { currentIdx++; renderQuestion(); }
  else showResult();
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  let score = 0;
  quizSet.forEach((q, i) => { if (userAnswers[i] === q.answer) score++; });
  document.getElementById('scoreNum').textContent = score;

  const titles = ['더 노력이 필요해요', '기초를 다져보세요', '절반은 맞혔어요!', '잘하고 있어요!', '훌륭해요!', '완벽합니다!'];
  const descs  = ['포기하지 말고 다시 도전!', '오답 해설을 꼼꼼히 읽어보세요.', '꾸준히 연습하면 합격 가능해요!', '조금만 더 하면 심화 1급!', '거의 다 왔어요!', '심화 1급 합격 실력입니다!'];
  const si = Math.min(score, 5);
  document.getElementById('scoreTitle').textContent = titles[si];
  document.getElementById('scoreDesc').textContent = descs[si];
  document.getElementById('remainInfo').textContent = `다음 라운드 출제 가능: ${getAvailableIndices().length}문제 (전체 ${ALL_Q.length}문제)`;

  const wrap = document.getElementById('reviewWrap');
  wrap.innerHTML = '';
  quizSet.forEach((q, i) => {
    const correct = userAnswers[i] === q.answer;
    const div = document.createElement('div');
    div.className = 'review-item' + (correct ? '' : ' wrong');
    const myAns = userAnswers[i] !== null
      ? `내 답: ${userAnswers[i] + 1}번 — ${q.options[userAnswers[i]]}`
      : '미응답';
    div.innerHTML = `
      <div class="review-q">${q.round} · 문제 ${i + 1} · ${correct ? '✓ 정답' : '✗ 오답'}</div>
      <div class="review-question">${q.q}</div>
      <div class="review-answers">
        <div class="answer-correct">정답: ${q.answer + 1}번 — ${q.options[q.answer]}</div>
        ${!correct ? `<div class="answer-wrong">${myAns}</div>` : ''}
      </div>
      <div class="review-explanation"><strong>해설</strong>${q.exp}</div>
    `;
    wrap.appendChild(div);
  });
}

updateStartInfo();
</script>
</body>
</html>
